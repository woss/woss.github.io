  search-index-init:
    image: woss/woss-io:latest
    build: .
    env_file: .env
    container_name: woss-search-index-init
    volumes:
      - ./data/:/app/data
    command: ["pnpm", "run", "build-index"]
    restart: "no"

  app:
    image: woss/woss-io:latest
    build: .
    env_file: .env
    ports:
      - "5173:3000"
    volumes:
      - ./data/:/app/data
    environment:
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - OPENAI_MODEL=gemma4:e4b
      - OPENAI_API_KEY=public
    depends_on:
      zinalog:
        condition: service_started
      # ollama:
      #   condition: service_started
      # ollama-init:
      #   condition: service_completed_successfully
      # ollama-warmup:
      #   condition: service_completed_successfully
      search-index-init:
        condition: service_completed_successfully
      # mermaid:
      #   condition: service_started
    restart: unless-stopped
    command: ["node", "build/index.js"]

  # mermaid:
  #   image: woss/drakov09-mermaid-server:latest
  #   env_file: .env
  #   expose:
  #     - "8080"
  #   ports:
  #     - "8121:8080"
  #   restart: unless-stopped

  zinalog:
    image: ghcr.io/iamceeso/zinalog:latest
    container_name: woss-zinalog
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      HOSTNAME: "0.0.0.0"
      DATABASE_PATH: /data/logs.db
      TRUST_PROXY: "false"
      ENCRYPTION_KEY: ${ZINALOG_ENCRYPTION_KEY}
    volumes:
      - ./data/zinalog:/data

volumes:
  ollama_data:
  search_data:
