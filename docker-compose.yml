services:
  ollama:
    image: ollama/ollama:latest
    container_name: woss-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: woss-ollama-init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: ['pull', 'gemma4:e4b']
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'

  search-index-init:
    image: woss/woss-io:latest
    build: .
    env_file: .env
    container_name: woss-search-index-init
    volumes:
      - ./new-data/:/app/data
    command: ["pnpm", "run", "build-index"]
    restart: "no"

  app:
    image: woss/woss-io:latest
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./new-data/:/app/data
    environment:
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - OPENAI_MODEL=gemma4:e4b
      - OPENAI_API_KEY=public
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
      search-index-init:
        condition: service_completed_successfully
    restart: unless-stopped
    command: ["node", "build/index.js"]

volumes:
  ollama_data:
  search_data:
